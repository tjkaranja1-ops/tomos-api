<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0d12" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TomOS" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/static/icon-192.png" />
  <link rel="stylesheet" href="/static/styles.css" />
  <title>TomOS</title>
</head>
<body>
  <header class="topbar">
    <h1>TomOS</h1>
    <button id="refresh" class="refresh" title="Pull latest">⟳</button>
  </header>

  <main id="view">
    <section id="todo" class="panel active"></section>
    <section id="calendar" class="panel"></section>
    <section id="emails" class="panel"></section>
  </main>

  <nav class="tabbar">
    <button class="tab active" data-tab="todo"><span>✓</span>To-Do</button>
    <button class="tab" data-tab="calendar"><span>▦</span>Calendar</button>
    <button class="tab" data-tab="emails"><span>✉</span>Emails</button>
  </nav>

  <div id="toast" class="toast"></div>

  <script src="/static/app.js"></script>
</body>
</html>
